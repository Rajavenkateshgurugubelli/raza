# Fly.io deployment configuration
# Deploy with: fly deploy

app = "raza-agent"
primary_region = "dfw"

[build]
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "raza_data"
  destination = "/data"

[[services.tcp_checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "45s"
